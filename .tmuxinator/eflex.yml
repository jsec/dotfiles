# ~/.tmuxinator/eflex.yml

name: eflex
root: ~/src/eflex/

pre:
  - redis-server /usr/local/etc/redis.conf
  - sudo proftpd

windows:
  - editor:
      layout: 36cf,364x90,0,0[364x75,0,0,0,364x14,0,76{182x14,0,76,7,181x14,183,76,15}]
      panes:
        - vim
        -
        -
  - app:
      layout: main-horizontal
      panes:
        - coffee
        #- cd webApp && ./run.sh
        - cd webapp-cli && npm start
  - api:
      layout: main-horizontal
      panes:
        - csharp
        - cd WebApi/WebApi/ && xbuild && xsp
  - node:
      layout: main-horizontal
      panes:
        - cd plcComm && npm install && iced app.coffee
        - cd tools/plcTester && npm install && iced app.coffee
  - redis:
      panes:
        - redis-cli
  - mongo:
      layout: main-horizontal
      panes:
        - mongo eflex
        - tail -f /usr/local/var/log/mongodb/mongo.log
  - trigger:
      layout: main-horizontal
      panes:
          #- make trigger && cd webApp/public && mkdir -p imagefiles && chmod a+w imagefiles && eVisionTrigger -c localhost -p /Users/jsec/src/eflex/webApp/public/imagefiles
          - make trigger && cd webapp-cli/dist && mkdir -p imagefiles && chmod a+w imagefiles && eVisionTrigger -c localhost -p /Users/jsec/src/eflex/webapp-cli/dist/imagefiles
          -
  - shell:
      layout: main-horizontal
      panes:
        -
        -
